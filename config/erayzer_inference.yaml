data_repeat: 1
debug: false
inference: false
inference_checkpoint_path: checkpoints/erayzer_multi.pt
inference_out_dir: experiments/inference/erayzer
inference_view_selector_type: even_I_B
model:
  class_name: erayzer_core.model.erayzer.ERayZer
  gaussians:
    n_gaussians: 1
    range_setting:
      far: 8
      near: 0
      type: linear_depth
    sh_degree: 3
    upsampler:
      upsample_factor: 1
  gs_per_pixel_sqrt: 1
  hard_pixelalign: true
  image_tokenizer:
    image_size: 256
    in_channels: 3
    patch_size: 16
    use_off_the_shelf: false
  input_with_pe: true
  near_plane: 0.2
  pose_latent:
    canonical: middle
    length: 1
    mode: pairwise
  scaling_bias: -3.0
  scaling_max: -2.0
  target_image:
    height: 256
    width: 256
  transformer:
    d: 768
    d_head: 64
    decoder_n_layer: 8
    depth_init: true
    encoder_geom_n_layer: 16
    encoder_n_layer: 16
    fix_decoder: false
    neck_n_layer: 1
    special_init: true
    use_qk_norm: true
  use_deferred_rendering: false
  use_gsplat: true
profile: false
training:
  allowed_gradnorm_factor: 5.0
  amp_dtype: bf16
  batch_size_per_gpu: 24
  beta1: 0.9
  beta2: 0.95
  camera_center_reg_weight: 0.0
  center_crop: true
  checkpoint_every: 2000
  dataset: dl3dv
  domain_randomization: true
  force_first_last_in_input: false
  force_resume_ckpt: false
  freeze_focal_steps: 200
  grad_accum_steps: 1
  grad_checkpoint_every: 1
  grad_clip_norm: 1.0
  l2_loss_weight: 1.0
  l1_loss_weight: 0.0
  lr: 0.0004
  max_fwdbwd_passes: 152000
  max_resample_tries: 200
  no_pass_steps: 200
  normalize_distance_to: 2.0
  num_all_views: 10
  num_epochs: 1000000
  num_input_views: 5
  num_target_views: 5
  num_threads: 8
  num_views: 10
  num_workers: 4
  perceptual_loss_weight: 0.2
  perceptual_loss_weight_path: weights/imagenet-vgg-verydeep-19.mat
  pose_consistency_reg_weight: 0.0
  prefetch_factor: 8
  print_every: 20
  random_shuffle: false
  random_split: true
  reset_lr: false
  reset_training_state: false
  reset_weight_decay: false
  resume_ckpt: none
  single_scene_overfit: false
  square_crop: true
  torch_compile: false
  use_amp: true
  use_rel_pose: true
  use_tf32: true
  view_selector:
    curriculum_iter: 86000
    curriculum_start_max_frame_dist: 1.0
    curriculum_start_min_frame_dist: 1.0
    key_name: avg_per_view
    max_frame_dist: 0.5
    min_frame_dist: 1.0
    type: covisibility
    sort_frames: true
    use_curriculum: true
  vis_every: 500
  warmup: 3000
  scheduler_type: cosine
  weight_decay: 0.05
